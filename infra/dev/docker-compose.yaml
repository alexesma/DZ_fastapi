services:
  frontend:
    container_name: dz_frontend_dev
    restart: always
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - web
  db:
    container_name: dz_db_dev
    image: postgres:13.0-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    env_file:
      - ../../.env
    # Для локальных тестов
    healthcheck:
      # Проверяем, доступна ли БД через pg_isready
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-postgres} -h 127.0.0.1 || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  web:
    container_name: dz_fastapi_dev
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ../../.env
    environment:
      RUN_MODE: "api"
      ENABLE_SCHEDULER: "0"
      RUN_MIGRATIONS_ON_STARTUP: "1"
      RUN_SEED_ON_STARTUP: "1"
      DATABASE_POOL_SIZE: "10"
      DATABASE_MAX_OVERFLOW: "10"
      DATABASE_POOL_TIMEOUT: "10"
    depends_on:
      db:
        condition: service_healthy  # Запуск web только когда db здорова
    healthcheck:
      # Для healthcheck нужен эндпойнт в FastAPI, напр. "/health"
      test: [ "CMD-SHELL", "curl --fail http://localhost:8000/health || exit 1" ]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 120s

  scheduler:
    container_name: dz_scheduler_dev
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    env_file:
      - ../../.env
    environment:
      RUN_MODE: "scheduler"
      ENABLE_SCHEDULER: "1"
      RUN_MIGRATIONS_ON_STARTUP: "0"
      RUN_SEED_ON_STARTUP: "0"
      DATABASE_POOL_SIZE: "5"
      DATABASE_MAX_OVERFLOW: "5"
      DATABASE_POOL_TIMEOUT: "15"
    healthcheck:
      disable: true
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  inbox_uploads_data:
